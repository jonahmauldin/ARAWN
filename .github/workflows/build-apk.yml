name: Build ARAWN APK

# Builds a debug APK in the cloud (no local Android SDK needed) and publishes
# it as a GitHub Release so it can be downloaded + sideloaded straight onto a
# phone. Triggers on every push to main, or manually from the Actions tab.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write   # needed to create the Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK packages
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build debug APK
        run: gradle :app:assembleDebug --stacktrace --no-daemon

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: arawn-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Publish APK to a Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: ARAWN debug build ${{ github.run_number }}
          body: |
            Automated debug APK for on-device testing.
            Download `app-debug.apk` below and tap it on the phone to install.
          files: app/build/outputs/apk/debug/*.apk
          fail_on_unmatched_files: true
